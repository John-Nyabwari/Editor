
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A source for your video and audio editing needs.">
        <title>Editing Solutions</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://fonts.google.com/specimen/Raleway"></script>
        <script src="https://kit.fontawesome.com/your-font-awesome-kit.js" crossorigin="anonymous"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> 
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <link rel="stylesheet" href="styles.css">
        <style >
            :root {
                --primary-color: #3b82f6;
                --secondary-color:#ffffff;
                --accent-color: #fbbf24;
                --background-color: #ffffff;
                --text-color: #111827;;
            }
            body {font-family: 'Inter', sans-serif;background-color: #ffffff;color: #111827;} 
            h1, h2, h3, h4, h5, h6 { font-family: 'Raleway', sans-serif;}
           .gold-text { color: #fbbf24;}
           .gold-bg {background-color: #fbbf24;}
           .gold-border {border-color: #fbbf24;}
           .btn-primary {background-color: var(--gold); color: #0f172a; transition: all 0.3s ease;}
           .btn-primary:hover {background-color: var(--gold-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(201, 162, 39, 0.4); color: #0f172a;}
           .btn-outline {border: 2px solid var(--gold); color: var(--gold); background-color: transparent; transition: all 0.3s ease;}
           .btn-outline:hover {background-color: var(--gold); color: #0f172a; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(201, 162, 39, 0.4);}
           .page-section {display: none; animation: fadeIn 1s ease-in-out; animation-fill-mode: forwards;}
           .page-section.active {display: block;}
           .glass-nav { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow:0 1px 20px rgba(0, 0, 0, 0.08); border-bottom:1px solid rgba(0, 0, 0, 0.08);}
           .hero-text-shadow { text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);}
           .hover-scale { transition: transform 0.3s ease; }
           .hover-scale:hover { transform: scale(1.05); }
           .smooth-scroll { scroll-behavior: smooth; }
           @keyframes fade-in { 0% { opacity:0; transform:translateY(10px); } to {opacity:100;transform: translateY(10px); } }
           .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
           @keyframes spinner { from { rotate: 0deg; } to { rotate: 360deg; } }
        </style>

        
    </head>
    <body class="text-gray-800 smooth-scroll overflow-x-hidden">
        <nav class="fixed w-full z-50 transition-all duration-300 py-4 glass-nav" id ="navbar">
            <div class="max-w-7xl mx-auto px-8 flex justify-between items-center font-bold text-gray-800">
                <a href="#" onclick="navigateToSection('home')" class="flex items-center gap-3 group">
                <div class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-200 text-gray-800 group-hover:bg-gray-300 transition-colors duration-300">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="hidden md:block">
                    <div class="flex items-center gap-2">
                    <img src="es-logo.svg" alt="Editing Solutions Logo" class="h-10 w-auto object-contain">
                    <h1 class="text-3xl font-bold tracking-wider group-hover:text-gray-500 transition text-grey-800">Editing Solutions</h1>
                    </div> 
                </div>
                </a>
                    <div class="hidden md:flex items-center gap-6">
                       <button onclick="navigateToSection('home')" class="hover:text-gray-300 transition-colors duration-300">Home</button>
                       <button onclick="navigateToSection('video-editing')" class="hover:text-gray-300 transition-colors duration-300">Video Editing</button>
                       <button onclick="navigateToSection('audio-editing')" class="hover:text-gray-300 transition-colors duration-300">Audio Editing</button>
                       <button onclick="navigateToSection('contact')" class="hover:text-gray-300 transition -colors duration-300">Contact</button>
                    </div> 
                    <button onclick="navigate(Quote)" class="md:hidden text-gray-800 hover:text-gray-600 transition-colors duration-300">
                    <button class="md:hidden text-grey text-2xl" onclick="toggleMobileMenu()">
                        <i class="fas fa-bars"></i>
                    </button>
            </nav>
        
<section id="home" class="page-section active min-h-screen relative overflow-hidden">
         <div class="absolute inset-0 z-0" style="
                 background-color: #fefcff;
                 background-image: 
                 radial-gradient(circle at 30% 70%, rgba(173, 216, 230, 0.35), transparent 60%),
                    radial-gradient(circle at 70% 30%, rgba(255, 182, 193, 0.4), transparent 60%);
         "></div>

        <div class="relative z-20 flex items-center justify-center min-h-screen text-center px-6">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-5xl md:text-6xl font-bold mb-6 text-gray-900 hero-text-shadow">Welcome to Editing Solutions</h1>
                <p class="text-lg md:text-xl mb-8 text-gray-600">Your one-stop source for professional video and audio editing services.</p>
                <button onclick="navigateToSection('video-editing')" 
                    class="px-8 py-3 rounded-lg text-lg font-semibold bg-yellow-400 hover:bg-yellow-500 text-gray-900 transition-all duration-300">
                    Get Started
                </button>
            </div>
         </div>

</section>

    </body>
</html>
